services:
  # Backend service (FastAPI)
  - type: web
    name: legal-ai-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        sync: false
        placeholder: "postgres://user:password@host:port/dbname"
      - key: OPENAI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PORT
        value: 10000

  # Frontend service (Served via Node)
  - type: web
    name: legal-ai-frontend
    env: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npx serve -s dist -l $PORT
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
        placeholder: "https://legal-ai-backend.onrender.com"
