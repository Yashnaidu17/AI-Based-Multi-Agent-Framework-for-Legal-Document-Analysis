services:
  # Backend FastAPI Service
  - type: web
    name: legal-ai-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./legal_analysis.db
      - key: PYTHON_VERSION
        value: 3.10.0

  # Frontend Static Site
  - type: static
    name: legal-ai-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: legal-ai-backend
          property: host
    routes:
      - type: rewrite
        source: /api/*
        destination: https://legal-ai-backend.onrender.com/api/* # Replace with actual backend URL after first deploy
      - type: rewrite
        source: /*
        destination: /index.html
